sonar.projectKey=NUS-ISS-Agile-Team_ceramicraft-customer-frontend
sonar.organization=swe5006-group12


# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=ceramicraft-customer-frontend
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Coverage exclusions - exclude all files from coverage analysis
sonar.coverage.exclusions=**/*

# Disable duplication detection entirely (affects both overall and New Code metrics)
# If you only want to change the Quality Gate and keep analysis, remove this and update the gate in SonarCloud UI.
sonar.cpd.exclusions=**/*

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8